<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Atividades Complementares</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --error: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Cabeçalho */
    header {
      background-color: var(--primary);
      color: white;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    /* Container Principal */
    .container {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
      flex: 1;
      width: 100%;
    }

    /* Cartões e Telas */
    .card {
      background-color: var(--card-bg);
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      border: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .hidden {
      display: none !important;
    }

    /* Formulários */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.9rem;
    }

    input, select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      width: 100%;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:disabled {
      background-color: var(--text-muted);
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
      margin-top: 0.5rem;
    }

    .btn-secondary:hover {
      background-color: #f1f5f9;
    }

    /* Alertas */
    .alert {
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .alert-error {
      background-color: #fee2e2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .alert-success {
      background-color: #d1fae5;
      color: var(--success);
      border: 1px solid #a7f3d0;
    }

    /* Painel do Usuário */
    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #e0e7ff;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      color: #3730a3;
    }

    .user-bar button {
      width: auto;
      padding: 0.5rem 1rem;
      background-color: #ef4444;
    }

    .user-bar button:hover {
      background-color: #dc2626;
    }

    /* Tabelas */
    .table-container {
      overflow-x: auto;
      margin-top: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    th {
      background-color: #f8fafc;
      font-weight: 600;
      color: var(--text-muted);
    }

    tr:hover {
      background-color: #f1f5f9;
    }

    /* Grid do Dashboard */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr 2fr;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Portal de Atividades Complementares</h1>
  </header>

  <div class="container">
    
    <div id="login-section" class="card" style="max-width: 450px; margin: 2rem auto;">
      <h2 style="margin-bottom: 1.5rem; text-align: center;">Acesso ao Sistema</h2>
      
      <div id="login-alert" class="alert hidden"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="userType">Tipo de Acesso</label>
          <select id="userType" required>
            <option value="Professor">Professor(a)</option>
            <option value="Coordenação">Coordenação</option>
          </select>
        </div>

        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" placeholder="Digite seu usuário" required>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" id="btn-login">Entrar</button>
      </form>
    </div>

    <div id="dashboard-section" class="hidden">
      
      <div class="user-bar">
        <div>
          <strong>Usuário logado:</strong> <span id="display-user">...</span> 
          (<span id="display-type">...</span>)
        </div>
        <button onclick="logout()">Sair</button>
      </div>

      <div class="dashboard-grid">
        
        <div class="card">
          <h3 style="margin-bottom: 1rem;">Inserir Novo Estudante</h3>
          
          <div id="student-alert" class="alert hidden"></div>

          <form id="student-form" onsubmit="handleAddStudent(event)">
            <div class="form-group">
              <label for="studentName">Nome Completo do Estudante</label>
              <input type="text" id="studentName" placeholder="Ex: Maria Oliveira" required>
            </div>

            <div class="form-group">
              <label for="turma">Turma / Série</label>
              <input type="text" id="turma" placeholder="Ex: 3º Ano B" required>
            </div>

            <button type="submit" id="btn-student">Cadastrar Estudante</button>
          </form>
        </div>

        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3>Dados de Monitoramento</h3>
            <button onclick="loadDashboardData()" class="btn-secondary" style="width: auto; padding: 0.4rem 0.8rem; font-size: 0.85rem; margin-top:0;">Atualizar Dados</button>
          </div>

          <div id="dashboard-alert" class="alert hidden"></div>
          
          <div class="table-container">
            <table id="dashboard-table">
              <thead>
                <tr id="table-headers">
                  <th>Carregando...</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr><td>Clique em Atualizar ou aguarde o carregamento.</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>

    </div>

  </div>

  <script>
    // URL DA API DO SEU GOOGLE APPS SCRIPT
    const URL_API = "https://script.google.com/macros/s/AKfycbx_66zXwOnaEab8HEXf9wG3llV7XpOCRbwNkacmKt2ePI4PmbqlgU9IpXPn1SORHkTG/exec";

    // Função genérica de chamada à API (Fetch)
    async function callApi(payload) {
      try {
        const response = await fetch(URL_API, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
        return await response.json();
      } catch (error) {
        console.error("Erro na API:", error);
        throw new Error("Erro ao conectar ao Google Apps Script. Verifique a URL ou sua internet.");
      }
    }

    // Exibir alertas visuais
    function showAlert(elementId, message, isSuccess = false) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = `alert ${isSuccess ? 'alert-success' : 'alert-error'}`;
      el.classList.remove('hidden');
    }

    // Esconder alertas
    function hideAlert(elementId) {
      document.getElementById(elementId).classList.add('hidden');
    }

    // ================= LOGIN =================
    async function handleLogin(event) {
      event.preventDefault();
      hideAlert('login-alert');

      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = "Verificando...";

      const userType = document.getElementById('userType').value;
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const result = await callApi({
          action: "login",
          userType: userType,
          username: username,
          password: password
        });

        if (result.success) {
          // Sucesso no login: Mostrar tela principal
          document.getElementById('login-section').classList.add('hidden');
          document.getElementById('dashboard-section').classList.remove('hidden');
          
          document.getElementById('display-user').textContent = username;
          document.getElementById('display-type').textContent = result.userType || userType;

          // Limpar formulário de login
          document.getElementById('password').value = "";
          
          // Carregar os dados iniciais do Dashboard
          loadDashboardData();
        } else {
          showAlert('login-alert', result.message || "Usuário ou senha inválidos.");
        }
      } catch (erro) {
        showAlert('login-alert', erro.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    }

    // ================= LOGOUT =================
    function logout() {
      document.getElementById('dashboard-section').classList.add('hidden');
      document.getElementById('login-section').classList.remove('hidden');
      hideAlert('login-alert');
      hideAlert('student-alert');
    }

    // ================= INSERIR ALUNO =================
    async function handleAddStudent(event) {
      event.preventDefault();
      hideAlert('student-alert');

      const btn = document.getElementById('btn-student');
      btn.disabled = true;
      btn.textContent = "Enviando...";

      const studentName = document.getElementById('studentName').value;
      const turma = document.getElementById('turma').value;

      try {
        const result = await callApi({
          action: "addStudent",
          studentName: studentName,
          turma: turma
        });

        if (result.success) {
          showAlert('student-alert', result.message, true);
          document.getElementById('student-form').reset();
        } else {
          showAlert('student-alert', result.message || "Erro ao inserir aluno.");
        }
      } catch (erro) {
        showAlert('student-alert', erro.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Cadastrar Estudante";
      }
    }

    // ================= CARREGAR DASHBOARD =================
    async function loadDashboardData() {
      hideAlert('dashboard-alert');
      const tableHeaders = document.getElementById('table-headers');
      const tableBody = document.getElementById('table-body');
      
      tableBody.innerHTML = "<tr><td colspan='5'>Carregando dados da planilha...</td></tr>";

      try {
        const result = await callApi({ action: "getDashboard" });

        if (result.success && result.data && result.data.length > 0) {
          const dados = result.data;
          
          // A primeira linha representa os Cabeçalhos (Headers) da planilha
          const headers = dados[0];
          tableHeaders.innerHTML = headers.map(h => `<th>${h}</th>`).join('');

          // O restante são as linhas de dados
          const linhas = dados.slice(1);
          if (linhas.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="${headers.length}">Nenhum registro encontrado.</td></tr>`;
          } else {
            tableBody.innerHTML = linhas.map(row => {
              return "<tr>" + row.map(cell => `<td>${cell !== "" ? cell : "-"}</td>`).join('') + "</tr>";
            }).join('');
          }
        } else {
          showAlert('dashboard-alert', result.message || "Não foi possível ler os dados.");
          tableBody.innerHTML = "<tr><td>Sem dados disponíveis.</td></tr>";
        }
      } catch (erro) {
        showAlert('dashboard-alert', erro.message);
        tableBody.innerHTML = "<tr><td>Erro ao carregar tabela.</td></tr>";
      }
    }
  </script>
</body>
</html>
